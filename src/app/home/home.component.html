<div class="page-wrapper">
  <mat-toolbar color="primary" class="page-toolbar">
    <button mat-icon-button (click)="layout.toggleMenu()" aria-label="Abrir/fechar menu">
      <mat-icon>menu</mat-icon>
    </button>
    <app-toolbar-logo></app-toolbar-logo>

    <span class="toolbar-title">Inventário</span>
    <span style="flex: 1 1 auto;"></span>
    <app-toolbar-user-actions></app-toolbar-user-actions>
  </mat-toolbar>

  <div class="content home-content">
    <section class="home-hero">
      <h1 class="home-hero__title">Inventário</h1>
    </section>

    <section class="home-cards" *ngIf="visibleCards.length > 0">
      <button
        type="button"
        class="home-card"
        *ngFor="let card of visibleCards"
        (click)="navigateTo(card.route)"
        [attr.aria-label]="card.title">
        <div class="home-card__icon-wrap">
          <mat-icon class="home-card__icon">{{ card.icon }}</mat-icon>
        </div>
        <h2 class="home-card__title">{{ card.title }}</h2>
        <p class="home-card__description">{{ card.description }}</p>
        <mat-icon class="home-card__arrow" aria-hidden="true">arrow_forward</mat-icon>
      </button>
    </section>
  </div>
</div>
