<div class="page-wrapper">
  <mat-toolbar color="primary" class="page-toolbar">
    <button mat-icon-button (click)="layout.toggleMenu()" aria-label="Abrir/fechar menu">
      <mat-icon>menu</mat-icon>
    </button>
    <app-toolbar-logo></app-toolbar-logo>

    <span class="toolbar-title">{{ isEdit ? 'Atualizar Acessório' : 'Novo Acessório' }}</span>
    <span style="flex: 1 1 auto;"></span>
    <app-toolbar-user-actions></app-toolbar-user-actions>
  </mat-toolbar>

  <div class="content">
    <mat-card class="form-card" appearance="outlined">
      <mat-card-header>
        <mat-card-subtitle>
          <ng-container *ngIf="!isEdit">Acessório independente: nome e quantidade (proprietário padrão: IRT)</ng-container>
          <ng-container *ngIf="isEdit">Ajuste nome e quantidade geral do acessório<a href="http://" target="_blank" rel="noopener noreferrer"></a></ng-container>
        </mat-card-subtitle>
      </mat-card-header>

      <mat-divider></mat-divider>

      <mat-card-content>
        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-grid">
          <mat-form-field appearance="outline" class="field-half">
            <mat-label>Nome</mat-label>
            <mat-icon matPrefix>label</mat-icon>
            <input matInput formControlName="name" />
            <mat-error *ngIf="form.get('name')?.hasError('required')">Nome é obrigatório</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="field-half">
            <mat-label>Quantidade</mat-label>
            <mat-icon matPrefix>numbers</mat-icon>
            <input matInput type="number" formControlName="quantity" min="1" step="1" />
            <mat-error *ngIf="form.get('quantity')?.hasError('required')">Quantidade é obrigatória</mat-error>
            <mat-error *ngIf="form.get('quantity')?.hasError('min')">Informe um valor maior que zero</mat-error>
          </mat-form-field>

        </form>
      </mat-card-content>

      <mat-divider></mat-divider>

      <mat-card-actions class="form-actions space-between-actions">
        <button mat-stroked-button type="button" (click)="voltar()" class="btn-cancelar">
          <mat-icon>close</mat-icon> Cancelar
        </button>
        <button
          mat-raised-button
          color="primary"
          type="submit"
          [disabled]="form.invalid || isSaving"
          (click)="onSubmit()"
          class="btn-salvar">
          <mat-icon>check_circle</mat-icon>
          Salvar
        </button>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
