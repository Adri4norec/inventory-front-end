<div
  class="app-shell"
  [class.app-shell--no-sidebar]="!showSidebar"
  [class.app-shell--menu-open]="showSidebar && layout.isMenuOpen"
  [style.--app-sidebar-width.px]="layout.sidebarWidthPx">
  <aside
    *ngIf="showSidebar"
    class="app-shell__sidebar"
    [class.app-shell__sidebar--open]="layout.isMenuOpen"
    [attr.aria-hidden]="!layout.isMenuOpen">
    <app-sidebar></app-sidebar>
  </aside>

  <main class="app-shell__main">
    <router-outlet></router-outlet>
  </main>
</div>
