<div class="page-wrapper">
  <mat-toolbar color="primary" class="page-toolbar">
    <button mat-icon-button (click)="layout.toggleMenu()" aria-label="Abrir/fechar menu">
      <mat-icon>menu</mat-icon>
    </button>
    <app-toolbar-logo></app-toolbar-logo>

    <span class="toolbar-title">Configuração de inventário</span>
    <span style="flex: 1 1 auto;"></span>
    <app-toolbar-user-actions></app-toolbar-user-actions>
  </mat-toolbar>

  <div class="content settings-content">
    <mat-card appearance="outlined" class="inventory-panel">
      <div class="inventory-panel-header">
        <div class="inventory-panel-intro">
          <h1 class="inventory-panel-title">Configuração de inventário</h1>
          <p class="inventory-panel-subtitle">Gerencie categorias, proprietários e projetos dos equipamentos.</p>
        </div>

        <button mat-flat-button color="primary" type="button" class="btn-new-record" (click)="openCreateDialog()">
          <mat-icon>add_circle</mat-icon>
          Novo registro
        </button>
      </div>

      <div class="inventory-tabs-wrap">
        <mat-tab-group
          class="inventory-tabs"
          mat-align-tabs="start"
          [mat-stretch-tabs]="false"
          [selectedIndex]="activeTab === 'categories' ? 0 : activeTab === 'proprietaries' ? 1 : 2"
          (selectedIndexChange)="onTabChange($event)"
          animationDuration="0ms">
          <mat-tab label="Categorias"></mat-tab>
          <mat-tab label="Proprietários"></mat-tab>
          <mat-tab label="Projetos"></mat-tab>
        </mat-tab-group>
      </div>

      <div *ngIf="loading" class="loading-block">
        <mat-progress-bar mode="indeterminate" color="primary"></mat-progress-bar>
        <p>Carregando registros...</p>
      </div>

      <div class="table-wrapper" *ngIf="!loading">
        <table mat-table [dataSource]="visibleRows" class="inventory-table">
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Nome</th>
            <td mat-cell *matCellDef="let row">
              <strong>{{ row.name }}</strong>
            </td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef class="actions-header">Ações</th>
            <td mat-cell *matCellDef="let row" class="actions-cell">
              <button
                mat-icon-button
                type="button"
                class="action-btn action-btn--edit"
                (click)="openEditDialog(row)"
                matTooltip="Editar"
                aria-label="Editar registro">
                <mat-icon>edit</mat-icon>
              </button>
              <button
                mat-icon-button
                type="button"
                class="action-btn action-btn--delete"
                (click)="deleteRecord(row)"
                matTooltip="Excluir"
                aria-label="Excluir registro">
                <mat-icon>delete_outline</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns; trackBy: trackRow"></tr>

          <tr class="mat-row" *matNoDataRow>
            <td class="mat-cell empty-cell" [attr.colspan]="displayedColumns.length">
              Nenhum registro encontrado.
            </td>
          </tr>
        </table>
      </div>

      <div class="table-footer" *ngIf="!loading">
        <span class="total-label">Total de {{ totalElements }} registro(s)</span>
        <mat-paginator
          [length]="totalElements"
          [pageIndex]="pageIndex"
          [pageSize]="pageSize"
          [pageSizeOptions]="[5, 10, 25, 50]"
          (page)="handlePageEvent($event)"
          showFirstLastButtons>
        </mat-paginator>
      </div>
    </mat-card>
  </div>
</div>
