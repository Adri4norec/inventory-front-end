<div class="page-wrapper">
    <mat-toolbar color="primary" class="page-toolbar">
        <button mat-icon-button (click)="layout.toggleMenu()" aria-label="Abrir/fechar menu">
            <mat-icon>menu</mat-icon>
        </button>
    <app-toolbar-logo></app-toolbar-logo>

        <mat-icon class="toolbar-icon">people</mat-icon>
        <span class="toolbar-title">Usuários</span>
        <span class="spacer"></span>
        <app-toolbar-user-actions></app-toolbar-user-actions>
    </mat-toolbar>

    <div class="content">
        <mat-card appearance="outlined" class="filter-card">
            <div class="filter-panel-toggle" [class.filter-panel-toggle--collapsed]="isFilterCollapsed">
                <button mat-icon-button type="button" class="filter-panel-toggle-btn" (click)="toggleFilterPanel()" [attr.aria-label]="isFilterCollapsed ? 'Expandir filtros' : 'Ocultar filtros'">
                    <mat-icon class="filter-panel-toggle-icon">filter_list</mat-icon>
                </button>
            </div>
            <div
                class="filter-panel-body"
                [class.filter-panel-body--collapsed]="isFilterCollapsed"
                [attr.aria-hidden]="isFilterCollapsed">
                <div class="filter-panel-body__inner">
                <div style="display: flex; gap: 15px; flex-wrap: wrap; align-items: center;">

                <mat-form-field appearance="outline" subscriptSizing="dynamic" class="compact-filter"
                    style="flex: 1; min-width: 150px;">
                    <mat-label>Nome</mat-label>
                    <input matInput [(ngModel)]="filtros.nome" (keyup.enter)="aplicarFiltros()">
                </mat-form-field>

                <mat-form-field appearance="outline" subscriptSizing="dynamic" class="compact-filter"
                    style="flex: 1; min-width: 150px;">
                    <mat-label>E-mail</mat-label>
                    <input matInput [(ngModel)]="filtros.email" (keyup.enter)="aplicarFiltros()">
                </mat-form-field>

                <mat-form-field appearance="outline" subscriptSizing="dynamic" class="compact-filter"
                    style="flex: 1; min-width: 150px;">
                    <mat-label>Usuário</mat-label>
                    <input matInput [(ngModel)]="filtros.usuario" (keyup.enter)="aplicarFiltros()">
                </mat-form-field>

            </div>

            <div style="display: flex; justify-content: space-between; gap: 12px; margin-top: 12px;">
                <button mat-stroked-button type="button" (click)="limparFiltros()">
                    <mat-icon>close</mat-icon> Cancelar
                </button>

                <button mat-flat-button color="primary" (click)="aplicarFiltros()">
                    <mat-icon>search</mat-icon> Buscar
                </button>
            </div>
                </div>
            </div>
        </mat-card>

        <div *ngIf="isLoading" class="loading-container">
            <mat-progress-bar mode="indeterminate" color="primary"></mat-progress-bar>
            <p class="loading-text">Buscando usuários cadastrados...</p>
        </div>

        <mat-card *ngIf="!isLoading" class="table-card" appearance="outlined">
            <mat-card-header>
                <mat-card-subtitle>{{ totalElements }} usuário(s) encontrado(s)</mat-card-subtitle>
            </mat-card-header>

            <mat-card-content>
                <table mat-table [dataSource]="usuarios" class="mat-elevation-z0 full-width">

                    <ng-container matColumnDef="fullName">
                        <th mat-header-cell *matHeaderCellDef> Nome Completo </th>
                        <td mat-cell *matCellDef="let u"> <strong>{{ u.fullName }}</strong> </td>
                    </ng-container>

                    <ng-container matColumnDef="email">
                        <th mat-header-cell *matHeaderCellDef> E-mail </th>
                        <td mat-cell *matCellDef="let u" class="email-cell"> {{ u.email }} </td>
                    </ng-container>

                    <ng-container matColumnDef="username">
                        <th mat-header-cell *matHeaderCellDef> Usuário </th>
                        <td mat-cell *matCellDef="let u"> {{ u.username }} </td>
                    </ng-container>

                    <ng-container matColumnDef="profileName">
                        <th mat-header-cell *matHeaderCellDef> Perfil </th>
                        <td mat-cell *matCellDef="let u">
                            <span class="status-chip" [ngClass]="'chip-' + profileChipClass(u.profileName)">
                                {{ u.profileName || 'N/A' }}
                            </span>
                        </td>
                    </ng-container>

                    <ng-container matColumnDef="actions">
                        <th mat-header-cell *matHeaderCellDef class="header-actions"> Ações </th>
                        <td mat-cell *matCellDef="let u">
                            <div class="action-buttons">
                                <button mat-icon-button [matMenuTriggerFor]="menu">
                                    <mat-icon>more_vert</mat-icon>
                                </button>
                            </div>

                            <mat-menu #menu="matMenu">
                                <button mat-menu-item (click)="visualizarUsuario(u)">
                                    <mat-icon color="primary">visibility</mat-icon>
                                    <span>Visualizar</span>
                                </button>

                                <mat-divider></mat-divider>

                                <button mat-menu-item (click)="editarUsuario(u)">
                                    <mat-icon>edit</mat-icon>
                                    <span>Editar Perfil</span>
                                </button>

                                <button mat-menu-item (click)="excluirUsuario(u)">
                                    <mat-icon color="warn">delete</mat-icon>
                                    <span>Excluir</span>
                                </button>
                            </mat-menu>
                        </td>
                    </ng-container>

                    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                    <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="table-row"></tr>

                    <tr class="mat-row" *matNoDataRow>
                        <td class="mat-cell empty-cell" [attr.colspan]="displayedColumns.length">
                            <div class="empty-state">
                                <mat-icon>person_off</mat-icon>
                                <p>Nenhum usuário encontrado no sistema.</p>
                            </div>
                        </td>
                    </tr>
                </table>

                <mat-paginator
                    [length]="totalElements"
                    [pageSize]="pageSize"
                    [pageIndex]="pageIndex"
                    [pageSizeOptions]="[5, 10, 25, 50]"
                    (page)="handlePageEvent($event)"
                    aria-label="Selecionar página">
                </mat-paginator>
            </mat-card-content>
        </mat-card>
    </div>
</div>
