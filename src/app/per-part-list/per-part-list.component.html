<div class="page-wrapper">
  <mat-toolbar color="primary" class="page-toolbar">
    <button mat-icon-button (click)="layout.toggleMenu()" aria-label="Abrir/fechar menu">
      <mat-icon>menu</mat-icon>
    </button>
    <span class="toolbar-title">Listagem de acessórios</span>
    <span style="flex: 1 1 auto;"></span>
    <app-toolbar-user-actions></app-toolbar-user-actions>
  </mat-toolbar>

  <div class="content equipament-list-content">

    <mat-card appearance="outlined" class="filter-card">
      <div style="display: flex; gap: 15px; flex-wrap: wrap; align-items: center;">

        <mat-form-field appearance="outline" subscriptSizing="dynamic" class="compact-filter"
          style="flex: 1; min-width: 150px; max-width: 500px;">
          <mat-label>Nome</mat-label>
          <input matInput [(ngModel)]="filtros.nome" (keyup.enter)="aplicarFiltros()">
        </mat-form-field>

        <!--<mat-form-field appearance="outline" subscriptSizing="dynamic" class="compact-filter"
          style="flex: 1; min-width: 150px;">
          <mat-label>Proprietário</mat-label>
          <input matInput [(ngModel)]="filtros.responsavel" (keyup.enter)="aplicarFiltros()">
        </mat-form-field>-->

      </div>

      <div style="display: flex; justify-content: space-between; gap: 12px; margin-top: 12px;">
        <button mat-stroked-button type="button" (click)="limparFiltros()">
          <mat-icon>close</mat-icon> Cancelar
        </button>

        <button mat-flat-button color="primary" (click)="aplicarFiltros()">
          <mat-icon>search</mat-icon> Buscar
        </button>
      </div>
    </mat-card>

    <div *ngIf="isLoading" class="loading-wrap">
      <mat-progress-bar mode="indeterminate" color="primary"></mat-progress-bar>
      <p class="loading-text">Carregando acessórios...</p>
    </div>

    <mat-card *ngIf="!isLoading" appearance="outlined" class="table-card">
      <mat-card-header>
        <mat-card-title>
          <mat-icon>category</mat-icon>
          Acessórios
        </mat-card-title>
        <mat-card-subtitle>{{ totalElements }} registro(s)</mat-card-subtitle>
      </mat-card-header>

      <mat-card-content class="table-card-content">
        <div class="table-scroll">
          <table mat-table [dataSource]="dataSource" class="full-width-table">
            <ng-container matColumnDef="name">
              <th mat-header-cell *matHeaderCellDef>Nome</th>
              <td mat-cell *matCellDef="let row">
                <span [matTooltip]="row.name">{{ row.name }}</span>
              </td>
            </ng-container>
            <ng-container matColumnDef="quantity">
              <th mat-header-cell *matHeaderCellDef>Quantidade</th>
              <td mat-cell *matCellDef="let row">
                {{ row.quantity }} / {{ row.originalTotalQuantity ?? row.quantity }}
              </td>
            </ng-container>
            <!--<ng-container matColumnDef="dataVencimento">
              <th mat-header-cell *matHeaderCellDef>Vencimento</th>
              <td mat-cell *matCellDef="let row">
                <span [matTooltip]="(row.dataVencimento | date:'dd/MM/yyyy HH:mm') || ''">
                  {{ (row.dataVencimento | date:'dd/MM/yyyy') || '-' }}
                </span>
              </td>
            </ng-container>-->
            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef style="text-align: right; white-space: nowrap; width: 60px;">Ações
              </th>
              <td mat-cell *matCellDef="let row" style="text-align: right;">
                <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Ações do acessório">
                  <mat-icon>more_vert</mat-icon>
                </button>
                <mat-menu #menu="matMenu">
                  <button mat-menu-item type="button" (click)="editar(row)">
                    <mat-icon color="primary">edit</mat-icon>
                    <span>Editar</span>
                  </button>
                  <button mat-menu-item type="button" (click)="excluir(row)">
                    <mat-icon color="warn">delete</mat-icon>
                    <span>Excluir</span>
                  </button>
                </mat-menu>
              </td>
            </ng-container>
            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            <tr class="mat-row" *matNoDataRow>
              <td class="mat-cell empty-cell" [attr.colspan]="displayedColumns.length">
                Nenhum acessório encontrado com os filtros selecionados.
              </td>
            </tr>
          </table>
        </div>

        <mat-paginator [length]="totalElements" [pageSize]="pageSize" [pageIndex]="pageIndex"
          [pageSizeOptions]="[5, 10, 25, 50]" (page)="handlePageEvent($event)" showFirstLastButtons
          aria-label="Selecionar página">
        </mat-paginator>
      </mat-card-content>
    </mat-card>
  </div>
</div>
